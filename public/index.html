<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquininha do Mao</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
    <body>
        <div>
            <div id="logo-pai">
                <div id="logo">
                    <img src="google_logo.svg" alt="">
                </div>
            </div>
            <form id="form-pesquisar">
                <div id="campo_pesquisar">
                    <label for="pesquisar"></label>
                        <div id="wrapper-pesquisar">
                            <div id="logo-lupa">
                                <img src="logo_lupa.svg" alt="">
                            </div>
                            <input type="text" name="pesquisar" id="pesquisar">

                        </div>
                </div>
            </form>
            <form id="form-filtrar">
                <div id="campo_filtros">
                    <label for="filtroQui">QUI</label>
                    <input type="checkbox" name="ativo" id="filtroQui" class="checkbox-filter">
                    <label for="filtroDcc">DCC</label>
                    <input type="checkbox" name="ativo" id="filtroDcc" class="checkbox-filter">
                    <label for ="filtroMat">MAT</label>
                    <input type="checkbox" name="ativo" id="filtroMat" class="checkbox-filter">
                    <label for="filtroFis">FIS</label>
                    <input type="checkbox" name="ativo" id="filtroFis" class="checkbox-filter">
                    <label for="filtroIce">ICE</label>
                    <input type="checkbox" name="ativo" id="filtroIce" class="checkbox-filter">
                    <label for="filtroEst">EST</label>
                    <input type="checkbox" name="ativo" id="filtroEst" class="checkbox-filter">
                </div>
            </form>

            <div id="campo_lista">
                <div id="lista-colunas">
                    <div class="colunes-list" role="columnheader" id="coluna-materia">
                        <span>Matéria</span>
                    </div>
                    <div class="colunes-list" role="columnheader" id="coluna-codigo">
                        <span>Código</span>
                    </div>
                    <div class="colunes-list" role="columnheader" id="coluna-turma">
                        <span>Turma</span>
                    </div>
                    <div class="colunes-list" role="columnheader" id="coluna-inicio">
                        <span>Início</span>
                    </div>
                    <div class="colunes-list" role="columnheader" id="coluna-fim">
                        <span>Fim</span>
                    </div>
                    <div class="colunes-list" role="columnheader" id="coluna-dias">
                        <span>Dias</span>
                    </div>
                    <div class="colunes-list" role="columnheader" id="coluna-sala">
                        <span>Sala</span>
                    </div>
                </div>
                <div class="linha-list" role="columnheader"></div>
            </div>
        </div>
    </body>
</html>
